name: Deploy Windows (auto release)

# Push to main → auto patch bump → GitHub Release (zip + version.json).
# Secrets: UNITY_LICENSE (or UNITY_EMAIL / UNITY_PASSWORD / UNITY_SERIAL)

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Assets/**"
      - "Packages/**"
      - "ProjectSettings/**"
      - "BuildSupport/**"
      - ".github/workflows/deploy-windows.yml"
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump when running manually"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: deploy-windows
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Windows + GitHub Release
    runs-on: windows-latest
    timeout-minutes: 180
    # Avoid release loops from bots / doc-only if filter missed
    if: >
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip release]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Resolve next version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          LATEST="$(git tag -l 'v*' --sort=-v:refname | head -n 1 || true)"

          if [ -z "$LATEST" ]; then
            V="0.1.0"
          else
            RAW="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$RAW"
            MAJOR="${MAJOR:-0}"
            MINOR="${MINOR:-0}"
            PATCH="${PATCH:-0}"
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              *)     PATCH=$((PATCH + 1)) ;;
            esac
            V="${MAJOR}.${MINOR}.${PATCH}"
          fi

          TAG="v${V}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists — aborting to avoid overwrite."
            exit 1
          fi

          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved next release: ${TAG} (bump=${BUMP}, previous=${LATEST:-none})"

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Win64-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Win64-
            Library-

      - name: Build Windows x64
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          BARAKI_BUILD_VERSION: ${{ steps.ver.outputs.version }}
        with:
          targetPlatform: StandaloneWindows64
          unityVersion: 6000.5.1f1
          buildsPath: build
          buildName: Windows
          allowDirtyBuild: true
          buildMethod: Game.Editor.WindowsCiBuild.Build

      - name: Zip + version.json
        id: zip
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $tag = "${{ steps.ver.outputs.tag }}"
          $src = "build/Windows"
          $zip = "baraki-windows-$tag.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path (Join-Path $src '*') -DestinationPath $zip
          $hash = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLowerInvariant()
          Set-Content -Path "sha256.txt" -Value $hash -NoNewline
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/$zip"
          $manifest = @{
            version = $ver
            minVersion = $ver
            url = $url
            sha256 = $hash
            releasedAt = (Get-Date).ToUniversalTime().ToString("o")
          } | ConvertTo-Json -Compress
          Set-Content -Path "version.json" -Value $manifest -NoNewline
          echo "zip=$zip" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release + tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: BARAKI ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            ${{ steps.zip.outputs.zip }}
            version.json
            sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
