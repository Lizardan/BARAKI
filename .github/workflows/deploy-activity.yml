name: Deploy Activity (WebGL to Cloudflare Pages)

# Secrets: UNITY_EMAIL, UNITY_PASSWORD, UNITY_LICENSE (or UNITY_SERIAL),
#          CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Vars (optional): PAGES_PROJECT (default baraki-activity), DISCORD_CLIENT_ID

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "Assets/**"
      - "Packages/**"
      - "ProjectSettings/**"
      - "web/activity-shell/**"
      - ".github/workflows/deploy-activity.yml"
      - "infra/scripts/assemble-activity-shell.sh"

concurrency:
  group: deploy-activity
  cancel-in-progress: true

env:
  PAGES_PROJECT: ${{ vars.PAGES_PROJECT || 'baraki-activity' }}

jobs:
  build-webgl:
    name: Build WebGL
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Extra swap (8G)
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: WebGL
          unityVersion: 6000.5.1f1
          buildsPath: build
          buildName: BARAKI
          allowDirtyBuild: true
          buildMethod: Game.Editor.WebGLCiBuild.Build
          manualExit: true
          customParameters: -ForceDisableUnityAudio -nographics

      - name: List WebGL outputs
        if: always()
        run: |
          find build -type f \( -name '*.loader.js' -o -name 'index.html' -o -name '*.wasm*' \) 2>/dev/null | head -50 || true
          ls -laR build 2>/dev/null | head -120 || true

      - name: Upload WebGL artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: build
          if-no-files-found: error
          retention-days: 7

  deploy-pages:
    name: Deploy Cloudflare Pages
    needs: build-webgl
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download WebGL artifact
        uses: actions/download-artifact@v4
        with:
          name: webgl-build
          path: _webgl

      - name: Debug artifact layout
        run: |
          echo "PWD=$(pwd)"
          find _webgl -maxdepth 5 -type f | head -80 || true
          du -sh _webgl || true

      - name: Assemble activity shell
        env:
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
        run: |
          chmod +x infra/scripts/assemble-activity-shell.sh
          ./infra/scripts/assemble-activity-shell.sh _webgl web/activity-shell

      # region agent log
      - name: Diagnose Cloudflare Pages deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN}" || { echo "CLOUDFLARE_API_TOKEN is empty"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID}" || { echo "CLOUDFLARE_ACCOUNT_ID is empty"; exit 1; }
          largest_file="$(find web/activity-shell -type f -printf '%s %p\n' | sort -nr | head -1)"
          printf '{"sessionId":"a9f01b","runId":"pre-fix","hypothesisId":"H1-H4","location":"deploy-activity.yml:Diagnose Cloudflare Pages deployment","message":"Cloudflare deploy preflight","data":{"node":"%s","largestFile":"%s","tokenPresent":true,"accountIdPresent":true},"timestamp":%s}\n' \
            "$(node --version)" "${largest_file//\"/\\\"}" "$(date +%s000)" | tee -a debug-a9f01b.log
          npx wrangler@latest --version
          npx wrangler@latest pages project list
      # endregion

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/activity-shell --project-name=${{ env.PAGES_PROJECT }}
