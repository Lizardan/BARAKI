name = "baraki-matchmaker"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Set once after first deploy:
#   npx wrangler secret put REGISTER_SECRET
#
# Tunnel + active match live in KV so Discord proxy and direct
# workers.dev hits share the same state across isolates.
#
# PUBLIC_WSS_HOST: stable Discord Portal /wss target (this Worker).
# Clients receive wss://PUBLIC_WSS_HOST; Worker proxies to registered tunnel.

[vars]
PUBLIC_WSS_HOST = "baraki-matchmaker.lizard268.workers.dev"

[[kv_namespaces]]
binding = "BARAKI_STORE"
id = "b23fd36bf9ab47049b2f9731ea2dd0ff"
