<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="BARAKI — мультиплеерная FFA-стратегия для Windows." />
  <title>BARAKI</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b12;
      --card: rgba(18, 27, 44, 0.78);
      --card-border: rgba(118, 171, 255, 0.24);
      --text: #f4f8ff;
      --muted: #9ba9bd;
      --accent: #53a8ff;
      --accent-strong: #8fd0ff;
      --danger: #ffcf70;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(83, 168, 255, 0.24), transparent 28rem),
        radial-gradient(circle at 82% 78%, rgba(255, 207, 112, 0.16), transparent 24rem),
        linear-gradient(135deg, #05070d 0%, var(--bg) 48%, #101827 100%);
    }

    main {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 3rem 1.25rem;
    }

    .hero {
      width: min(100%, 58rem);
      padding: clamp(2rem, 5vw, 4.5rem);
      text-align: center;
      border: 1px solid var(--card-border);
      border-radius: 2rem;
      background: linear-gradient(180deg, rgba(18, 27, 44, 0.88), var(--card));
      box-shadow: 0 2rem 6rem rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 1rem;
      color: var(--accent-strong);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.26em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 13vw, 9rem);
      line-height: 0.85;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .subtitle {
      max-width: 43rem;
      margin: 1.5rem auto 0;
      color: var(--muted);
      font-size: clamp(1.05rem, 2.5vw, 1.35rem);
      line-height: 1.7;
    }

    .download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: min(100%, 18rem);
      margin-top: 2.5rem;
      padding: 1rem 1.6rem;
      border: 0;
      border-radius: 999px;
      color: #06101d;
      background: linear-gradient(135deg, var(--accent-strong), var(--accent));
      box-shadow: 0 1rem 2.5rem rgba(83, 168, 255, 0.32);
      font-size: 1.08rem;
      font-weight: 900;
      text-decoration: none;
      text-transform: uppercase;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }

    .download:hover,
    .download:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 1.3rem 3rem rgba(83, 168, 255, 0.44);
    }

    .filename {
      margin: 0.9rem 0 0;
      color: var(--danger);
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
      font-size: 0.95rem;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .links a {
      color: var(--muted);
      text-decoration: none;
    }

    .links a:hover,
    .links a:focus-visible {
      color: var(--text);
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="title">
      <p class="eyebrow">Windows x64 multiplayer strategy</p>
      <h1 id="title">BARAKI</h1>
      <p class="subtitle">
        Мультиплеерная FFA-стратегия: строй базу, держи экономику и оборону,
        а армии сами идут в бой. Установщик ниже ставит обновляющий клиент,
        который подтянет последнюю полноценную версию игры.
      </p>
      <a class="download" href="/download">Скачать</a>
      <p class="filename">BARAKI-Setup.exe</p>
      <nav class="links" aria-label="Ссылки">
        <a href="https://lizardan.github.io/BARAKI/privacy.html">Privacy Policy</a>
        <a href="https://lizardan.github.io/BARAKI/terms.html">Terms of Service</a>
      </nav>
    </section>
  </main>
</body>
</html>
