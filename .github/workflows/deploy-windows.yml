name: Deploy Windows (auto release)

# Push to main → auto patch bump → GitHub Release (BARAKI-vX.Y.Z.zip only).
# Client reads latest tag via /releases/latest redirect — no version.json.
# Secrets: UNITY_LICENSE (or UNITY_EMAIL / UNITY_PASSWORD / UNITY_SERIAL)
#
# Build and release are separate jobs so a GitHub API blip can re-run
# only the release step without rebuilding Unity.
#
# CI speed notes (GitHub-hosted Windows):
# - Docker Unity image pull dominates (~10+ min); pre-pull overlaps Library cache restore.
# - windows-mono image tag is not published for 6000.5.1f1 on Windows hosts — use il2cpp.
# - Packages/manifest.ci.json drops editor-only tooling (MCP / Cursor IDE) for faster resolve.

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Assets/**"
      - "Packages/**"
      - "ProjectSettings/**"
      - "BuildSupport/**"
      - ".github/workflows/deploy-windows.yml"
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump when running manually"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: deploy-windows
  cancel-in-progress: false

permissions:
  contents: write
  actions: write # delete Actions artifacts after release

env:
  # Explicit image so background pre-pull matches game-ci/unity-builder customImage.
  # No windows-mono tag for this version on Windows runners (Docker Hub 2026-07).
  UNITY_DOCKER_IMAGE: unityci/editor:windows-6000.5.5f1-windows-il2cpp-3

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 180
    if: >
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip release]')
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      zip: ${{ steps.zip.outputs.zip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          fetch-tags: true
          lfs: false

      - name: Resolve next version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          LATEST="$(git tag -l 'v*' --sort=-v:refname | head -n 1 || true)"

          if [ -z "$LATEST" ]; then
            V="0.1.0"
          else
            RAW="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$RAW"
            MAJOR="${MAJOR:-0}"
            MINOR="${MINOR:-0}"
            PATCH="${PATCH:-0}"
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              *)     PATCH=$((PATCH + 1)) ;;
            esac
            V="${MAJOR}.${MINOR}.${PATCH}"
          fi

          TAG="v${V}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists — aborting to avoid overwrite."
            exit 1
          fi

          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved next release: ${TAG} (bump=${BUMP}, previous=${LATEST:-none})"

      # Slim manifest for CI: skip editor tooling packages (MCP, Cursor IDE).
      # Keep Packages/manifest.json for local Editor; update manifest.ci.json when adding runtime deps.
      - name: Use CI manifest
        shell: pwsh
        run: |
          Copy-Item -Force "Packages/manifest.ci.json" "Packages/manifest.json"
          Write-Host "Applied Packages/manifest.ci.json (no MCP / Cursor IDE packages)."

      # Overlap Docker pull with Library cache restore (biggest fixed cost on hosted runners).
      - name: Start Docker image pull (background)
        shell: pwsh
        run: |
          $img = $env:UNITY_DOCKER_IMAGE
          $stateDir = Join-Path $env:RUNNER_TEMP "docker-pull"
          New-Item -ItemType Directory -Force -Path $stateDir | Out-Null
          $wrapper = Join-Path $stateDir "pull.ps1"
          $outLog = Join-Path $stateDir "out.log"
          $exitFile = Join-Path $stateDir "exitcode.txt"
          $doneFile = Join-Path $stateDir "done.txt"
          # Avoid @" "@ here-strings (closing "@ must be column 0; awkward in YAML).
          @(
            "`$ErrorActionPreference = 'Continue'"
            "`$sw = [System.Diagnostics.Stopwatch]::StartNew()"
            "docker pull '$img' *>&1 | Tee-Object -FilePath '$outLog'"
            "`$code = `$LASTEXITCODE"
            "`$sw.Stop()"
            "Set-Content -Path '$exitFile' -Value `$code"
            "Set-Content -Path '$doneFile' -Value ([int]`$sw.Elapsed.TotalSeconds)"
            "exit `$code"
          ) | Set-Content -Path $wrapper -Encoding utf8
          $p = Start-Process -FilePath "pwsh" `
            -ArgumentList @("-NoProfile", "-File", $wrapper) `
            -WorkingDirectory (Get-Location).Path `
            -PassThru `
            -WindowStyle Hidden
          Set-Content -Path (Join-Path $stateDir "pid.txt") -Value $p.Id
          Write-Host "Background docker pull started (pid=$($p.Id)) for $img"

      # Stable key: package/Unity version changes invalidate; script/asset edits reuse Library.
      # Hash manifest.ci.json (not post-copy manifest.json) so key stays intentional.
      - name: Cache Library
        id: cache-library
        uses: actions/cache@v6
        with:
          path: Library
          key: Library-Win64-${{ hashFiles('Packages/manifest.ci.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt', 'Assets/**/*.asmdef') }}
          restore-keys: |
            Library-Win64-
            Library-

      # Incomplete restores (missing/zero ArtifactDB) make Unity rebuild Library anyway and poison the next save.
      - name: Verify Library cache
        id: verify-library
        shell: pwsh
        run: |
          $lib = "Library"
          $status = "missing"
          if (-not (Test-Path $lib)) {
            Write-Host "No Library folder — cold import."
            "library_status=$status" >> $env:GITHUB_OUTPUT
            exit 0
          }
          $db = Join-Path $lib "ArtifactDB"
          $info = Join-Path $lib "SourceAssetDB"
          $dbOk = (Test-Path $db) -and ((Get-Item $db).Length -gt 0)
          $infoOk = (Test-Path $info) -and ((Get-Item $info).Length -gt 0)
          if ($dbOk -and $infoOk) {
            $status = "usable"
            Write-Host ("Library cache looks usable: ArtifactDB={0:N0} B, SourceAssetDB={1:N0} B" -f (Get-Item $db).Length, (Get-Item $info).Length)
            "library_status=$status" >> $env:GITHUB_OUTPUT
            exit 0
          }
          $status = "wiped-incomplete"
          Write-Warning "Library cache incomplete (ArtifactDB/SourceAssetDB missing or empty) — wiping for a clean import."
          Remove-Item -Recurse -Force $lib
          "library_status=$status" >> $env:GITHUB_OUTPUT

      - name: Wait for Docker pull
        id: docker-pull
        shell: pwsh
        run: |
          $stateDir = Join-Path $env:RUNNER_TEMP "docker-pull"
          $pidFile = Join-Path $stateDir "pid.txt"
          if (-not (Test-Path $pidFile)) { throw "Missing docker-pull pid file" }
          $procId = [int](Get-Content $pidFile)
          Write-Host "Waiting for docker pull (pid=$procId)..."
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          Wait-Process -Id $procId -ErrorAction SilentlyContinue
          $sw.Stop()
          $exitFile = Join-Path $stateDir "exitcode.txt"
          $doneFile = Join-Path $stateDir "done.txt"
          if (-not (Test-Path $exitFile)) {
            throw "Docker pull process exited without writing exit code (waited $([int]$sw.Elapsed.TotalSeconds)s)"
          }
          $code = [int](Get-Content $exitFile)
          $pullSec = if (Test-Path $doneFile) { [int](Get-Content $doneFile) } else { [int]$sw.Elapsed.TotalSeconds }
          "pull_seconds=$pullSec" >> $env:GITHUB_OUTPUT
          $outLog = Join-Path $stateDir "out.log"
          if (Test-Path $outLog) {
            Write-Host "---- docker pull log (tail) ----"
            Get-Content $outLog -Tail 30
          }
          if ($code -ne 0) { throw "docker pull failed with exit code $code" }
          Write-Host "Docker pull finished in ${pullSec}s (exit 0)."

      # game-ci on Windows often does not forward custom env into Unity — stamp via file + ProjectSettings.
      - name: Stamp bundle version for build
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          New-Item -ItemType Directory -Force -Path "BuildSupport" | Out-Null
          Set-Content -Path "BuildSupport/ci-version.txt" -Value $ver -NoNewline -Encoding utf8
          $ps = "ProjectSettings/ProjectSettings.asset"
          $raw = Get-Content -Path $ps -Raw
          $updated = [regex]::Replace($raw, '(?m)^(\s*bundleVersion:\s*).*$', "`${1}$ver")
          if ($updated -eq $raw) { throw "Failed to patch bundleVersion in $ps" }
          [System.IO.File]::WriteAllText((Resolve-Path $ps), $updated)
          Write-Host "Stamped bundleVersion=$ver"

      - name: Build Windows x64
        id: unity-build
        uses: game-ci/unity-builder@v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          BARAKI_BUILD_VERSION: ${{ steps.ver.outputs.version }}
        with:
          targetPlatform: StandaloneWindows64
          unityVersion: 6000.5.5f1
          customImage: ${{ env.UNITY_DOCKER_IMAGE }}
          buildsPath: build
          buildName: Windows
          allowDirtyBuild: true
          buildMethod: Game.Editor.WindowsCiBuild.Build

      - name: Zip build
        id: zip
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          $src = "build/Windows"
          $zip = "BARAKI-$tag.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path (Join-Path $src '*') -DestinationPath $zip
          echo "zip=$zip" >> $env:GITHUB_OUTPUT

      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-${{ steps.ver.outputs.tag }}
          path: ${{ steps.zip.outputs.zip }}
          if-no-files-found: error
          # Safety net if release job fails; successful runs delete these immediately.
          retention-days: 1

      - name: CI timing summary
        if: always()
        shell: pwsh
        run: |
          $cacheHit = "${{ steps.cache-library.outputs.cache-hit }}"
          $libStatus = "${{ steps.verify-library.outputs.library_status }}"
          $pullSec = "${{ steps.docker-pull.outputs.pull_seconds }}"
          if ([string]::IsNullOrWhiteSpace($pullSec)) { $pullSec = "n/a" }
          $lines = @(
            "## Windows CI timing",
            "",
            "| Step | Detail |",
            "|------|--------|",
            "| Version | `${{ steps.ver.outputs.tag }}` |",
            "| Docker image | ``$env:UNITY_DOCKER_IMAGE`` |",
            "| Docker pull (wall) | ${pullSec}s (overlapped with Library cache) |",
            "| Library cache-hit | ``$cacheHit`` |",
            "| Library status | ``$libStatus`` |",
            "| Unity build | see step duration for **Build Windows x64** |",
            "",
            "Baseline before optimizations: ~18 min total (~13 min Docker pull sequential).",
            "Compare this run's job duration and Docker pull seconds after merge.",
            "Deferred micro-opts (7z zip, dockerCpuLimit) — only if pull/Library still dominate after measurement."
          )
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          Write-Host "Wrote CI timing summary."

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v8
        with:
          name: windows-release-${{ needs.build.outputs.tag }}
          path: dist

      - name: Create GitHub Release + tag (with retries)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build.outputs.tag }}
          VERSION: ${{ needs.build.outputs.version }}
          ZIP: ${{ needs.build.outputs.zip }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          test -f "$ZIP"

          attempt=1
          max=8
          delay=20
          while true; do
            echo "Release attempt ${attempt}/${max} for ${TAG}..."
            if gh release create "$TAG" \
              "$ZIP" \
              --repo "${{ github.repository }}" \
              --title "BARAKI ${TAG}" \
              --target "$SHA" \
              --generate-notes; then
              echo "Release ${TAG} created."
              exit 0
            fi

            if [ "$attempt" -ge "$max" ]; then
              echo "Failed to create release after ${max} attempts (GitHub API)."
              exit 1
            fi

            echo "GitHub API failed; waiting ${delay}s before retry..."
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
            if [ "$delay" -gt 120 ]; then
              delay=120
            fi
          done

      # Actions artifacts count toward Actions storage (esp. private). Release zips do not.
      - name: Prune Actions artifacts + old releases
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_RELEASES: "2"
        shell: bash
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          echo "Deleting Actions artifacts named windows-release-*..."
          # Paginate; delete every CI bundle so large Unity zips don't linger in Actions storage.
          gh api --paginate "repos/${REPO}/actions/artifacts" \
            --jq '.artifacts[] | select(.name | startswith("windows-release-")) | [.id, .name] | @tsv' \
            | while IFS=$'\t' read -r id name; do
                [ -n "${id:-}" ] || continue
                echo "  delete artifact ${name} (id=${id})"
                gh api -X DELETE "repos/${REPO}/actions/artifacts/${id}" || true
              done

          echo "Keeping last ${KEEP_RELEASES} GitHub Releases; deleting older..."
          mapfile -t tags < <(gh release list --repo "$REPO" --limit 50 --json tagName -q '.[].tagName')
          if [ "${#tags[@]}" -gt "$KEEP_RELEASES" ]; then
            for ((i=KEEP_RELEASES; i<${#tags[@]}; i++)); do
              old="${tags[$i]}"
              echo "  delete release ${old}"
              gh release delete "$old" --repo "$REPO" --yes --cleanup-tags || true
            done
          else
            echo "  nothing to prune (${#tags[@]} release(s))."
          fi
