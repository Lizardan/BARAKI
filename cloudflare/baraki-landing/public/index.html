<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="BARAKI — мультиплеерная FFA-стратегия для Windows." />
  <title>BARAKI</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f0f10;
      --bg-deep: #09090a;
      --panel: #222224;
      --panel-strong: #343438;
      --rim: #7d7568;
      --rim-strong: #343438;
      --text: #efe4cf;
      --muted: #b8a982;
      --accent: #56677a;
      --cloth: #56677a;
      --success: #58cc68;
      --danger: #a34130;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 16%, rgba(88, 204, 104, 0.14), transparent 24rem),
        radial-gradient(circle at 84% 72%, rgba(86, 103, 122, 0.28), transparent 26rem),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 56px),
        linear-gradient(135deg, var(--bg-deep) 0%, var(--bg) 50%, #171719 100%);
    }

    main {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 3rem 1.25rem;
    }

    .hero {
      position: relative;
      width: min(100%, 58rem);
      padding: clamp(2rem, 5vw, 4.5rem);
      text-align: center;
      overflow: hidden;
      border: 2px solid var(--rim);
      border-radius: 0;
      background:
        linear-gradient(90deg, rgba(86, 103, 122, 0.34), transparent 70%),
        linear-gradient(180deg, rgba(52, 52, 56, 0.96), rgba(34, 34, 36, 0.94));
      box-shadow:
        inset 0 0 0 2px rgba(0, 0, 0, 0.42),
        0 2rem 6rem rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0.75rem;
      pointer-events: none;
      border: 2px solid rgba(125, 117, 104, 0.48);
      border-radius: 0;
    }

    .hero::after {
      content: "";
      position: absolute;
      top: 0;
      right: clamp(1.4rem, 4vw, 3.5rem);
      width: 4.5rem;
      height: 8rem;
      background: linear-gradient(180deg, #56677a, var(--cloth));
      clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 78%, 0 100%);
      opacity: 0.92;
    }

    .eyebrow {
      margin: 0 0 1rem;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.26em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(4rem, 13vw, 9rem);
      line-height: 0.85;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 4px 0 rgba(0, 0, 0, 0.62);
    }

    .subtitle {
      max-width: 43rem;
      margin: 1.5rem auto 0;
      color: var(--muted);
      font-size: clamp(1.05rem, 2.5vw, 1.35rem);
      line-height: 1.7;
    }

    .download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: min(100%, 18rem);
      margin-top: 2.5rem;
      padding: 1rem 1.6rem;
      border: 2px solid var(--rim);
      border-radius: 0;
      color: var(--text);
      background: linear-gradient(180deg, #7fed8c, var(--success) 46%, #2f8d42);
      box-shadow:
        inset 0 -0.28rem 0 rgba(0, 0, 0, 0.22),
        0 1rem 2.5rem rgba(0, 0, 0, 0.32);
      font-size: 1.08rem;
      font-weight: 900;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.38);
      transition: transform 150ms ease, filter 150ms ease;
    }

    .download:hover,
    .download:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .filename {
      margin: 0.9rem 0 0;
      color: var(--accent);
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
      font-size: 0.95rem;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .links a {
      color: var(--muted);
      text-decoration: none;
    }

    .links a:hover,
    .links a:focus-visible {
      color: var(--text);
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="title">
      <p class="eyebrow">Windows x64 multiplayer strategy</p>
      <h1 id="title">BARAKI</h1>
      <p class="subtitle">
        Мультиплеерная FFA-стратегия: строй базу, держи экономику и оборону,
        а армии сами идут в бой. Установщик ниже ставит обновляющий клиент,
        который подтянет последнюю полноценную версию игры.
      </p>
      <a class="download" href="/download">Скачать</a>
      <p class="filename">BARAKI-Setup.exe</p>
      <nav class="links" aria-label="Ссылки">
        <a href="https://lizardan.github.io/BARAKI/privacy.html">Privacy Policy</a>
        <a href="https://lizardan.github.io/BARAKI/terms.html">Terms of Service</a>
      </nav>
    </section>
  </main>
</body>
</html>
