name: Deploy Activity (WebGL to Cloudflare Pages)

# Secrets: UNITY_EMAIL, UNITY_PASSWORD, UNITY_LICENSE (or UNITY_SERIAL),
#          CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Vars (optional): PAGES_PROJECT (default baraki), DISCORD_CLIENT_ID

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "Assets/**"
      - "Packages/**"
      - "ProjectSettings/**"
      - "web/activity-shell/**"
      - ".github/workflows/deploy-activity.yml"
      - "infra/scripts/assemble-activity-shell.sh"

concurrency:
  group: deploy-activity
  cancel-in-progress: true

env:
  PAGES_PROJECT: ${{ vars.PAGES_PROJECT || 'baraki' }}

jobs:
  build-webgl:
    name: Build WebGL
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Restore WebGL build
        id: webgl-cache
        uses: actions/cache@v4
        with:
          path: build
          key: WebGL-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}

      - name: Free disk space
        if: steps.webgl-cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Extra swap (8G)
        if: steps.webgl-cache.outputs.cache-hit != 'true'
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Cache Library
        if: steps.webgl-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Build WebGL
        if: steps.webgl-cache.outputs.cache-hit != 'true'
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: WebGL
          unityVersion: 6000.5.1f1
          buildsPath: build
          buildName: BARAKI
          allowDirtyBuild: true
          buildMethod: Game.Editor.WebGLCiBuild.Build
          manualExit: true
          customParameters: -ForceDisableUnityAudio -nographics

      - name: Upload WebGL artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: build
          if-no-files-found: error
          retention-days: 7

  deploy-pages:
    name: Deploy Cloudflare Pages
    needs: build-webgl
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download WebGL artifact
        uses: actions/download-artifact@v4
        with:
          name: webgl-build
          path: _webgl

      - name: Assemble activity shell
        env:
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
        run: |
          chmod +x infra/scripts/assemble-activity-shell.sh
          ./infra/scripts/assemble-activity-shell.sh _webgl web/activity-shell

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          projects_json="$(npx wrangler@latest pages project list --json)"
          list_status=$?
          # region agent log
          printf '{"sessionId":"a9f01b","runId":"pre-fix-2","hypothesisId":"H1-H4","location":"deploy-activity.yml:Ensure Cloudflare Pages project exists","message":"Pages project probe","data":{"project":"%s","listStatus":%s},"timestamp":%s}\n' \
            "${PAGES_PROJECT}" "${list_status}" "$(date +%s000)" | tee -a debug-a9f01b.log
          probe_summary="$(printf '%s' "${projects_json}" | tail -20 | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g')"
          echo "::notice title=Pages project probe (${PAGES_PROJECT})::status=${list_status} ${probe_summary}"
          # endregion
          if [[ ${list_status} -ne 0 ]]; then
            exit "${list_status}"
          fi

          if jq -e --arg name "${PAGES_PROJECT}" \
            '[.. | objects | (.name? // ."Project Name"? // empty)] | index($name) != null' <<<"${projects_json}" >/dev/null; then
            echo "Pages project '${PAGES_PROJECT}' exists."
            exit 0
          fi

          create_output="$(npx wrangler@latest pages project create "${PAGES_PROJECT}" \
            --production-branch="${GITHUB_REF_NAME}" 2>&1)"
          create_status=$?
          printf '%s\n' "${create_output}"
          if [[ ${create_status} -ne 0 ]]; then
            create_summary="$(printf '%s' "${create_output}" | tail -20 | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g')"
            echo "::error title=Pages project create failed (${PAGES_PROJECT})::${create_summary}"
            exit "${create_status}"
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@latest pages deploy web/activity-shell --project-name="${PAGES_PROJECT}"
