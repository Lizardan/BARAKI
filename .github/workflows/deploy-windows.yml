name: Deploy Windows (auto release)

# Push to main → auto patch bump → GitHub Release (zip + version.json).
# Secrets: UNITY_LICENSE (or UNITY_EMAIL / UNITY_PASSWORD / UNITY_SERIAL)
#
# Build and release are separate jobs so a GitHub API blip can re-run
# only the release step without rebuilding Unity.

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Assets/**"
      - "Packages/**"
      - "ProjectSettings/**"
      - "BuildSupport/**"
      - ".github/workflows/deploy-windows.yml"
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump when running manually"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: deploy-windows
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 180
    if: >
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip release]')
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      zip: ${{ steps.zip.outputs.zip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true
          fetch-depth: 0

      - name: Resolve next version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          LATEST="$(git tag -l 'v*' --sort=-v:refname | head -n 1 || true)"

          if [ -z "$LATEST" ]; then
            V="0.1.0"
          else
            RAW="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$RAW"
            MAJOR="${MAJOR:-0}"
            MINOR="${MINOR:-0}"
            PATCH="${PATCH:-0}"
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              *)     PATCH=$((PATCH + 1)) ;;
            esac
            V="${MAJOR}.${MINOR}.${PATCH}"
          fi

          TAG="v${V}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists — aborting to avoid overwrite."
            exit 1
          fi

          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved next release: ${TAG} (bump=${BUMP}, previous=${LATEST:-none})"

      - name: Cache Library
        uses: actions/cache@v6
        with:
          path: Library
          key: Library-Win64-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Win64-
            Library-

      - name: Build Windows x64
        uses: game-ci/unity-builder@v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          BARAKI_BUILD_VERSION: ${{ steps.ver.outputs.version }}
        with:
          targetPlatform: StandaloneWindows64
          unityVersion: 6000.5.1f1
          buildsPath: build
          buildName: Windows
          allowDirtyBuild: true
          buildMethod: Game.Editor.WindowsCiBuild.Build

      - name: Zip + version.json
        id: zip
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $tag = "${{ steps.ver.outputs.tag }}"
          $src = "build/Windows"
          $zip = "baraki-windows-$tag.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path (Join-Path $src '*') -DestinationPath $zip
          $hash = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLowerInvariant()
          Set-Content -Path "sha256.txt" -Value $hash -NoNewline
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/$zip"
          $manifest = @{
            version = $ver
            minVersion = $ver
            url = $url
            sha256 = $hash
            releasedAt = (Get-Date).ToUniversalTime().ToString("o")
          } | ConvertTo-Json -Compress
          Set-Content -Path "version.json" -Value $manifest -NoNewline
          echo "zip=$zip" >> $env:GITHUB_OUTPUT

      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-${{ steps.ver.outputs.tag }}
          path: |
            ${{ steps.zip.outputs.zip }}
            version.json
            sha256.txt
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v8
        with:
          name: windows-release-${{ needs.build.outputs.tag }}
          path: dist

      - name: Create GitHub Release + tag (with retries)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build.outputs.tag }}
          VERSION: ${{ needs.build.outputs.version }}
          ZIP: ${{ needs.build.outputs.zip }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          test -f "$ZIP"
          test -f version.json
          test -f sha256.txt

          attempt=1
          max=8
          delay=20
          while true; do
            echo "Release attempt ${attempt}/${max} for ${TAG}..."
            if gh release create "$TAG" \
              "$ZIP" \
              version.json \
              sha256.txt \
              --repo "${{ github.repository }}" \
              --title "BARAKI ${TAG}" \
              --target "$SHA" \
              --generate-notes; then
              echo "Release ${TAG} created."
              exit 0
            fi

            if [ "$attempt" -ge "$max" ]; then
              echo "Failed to create release after ${max} attempts (GitHub API)."
              exit 1
            fi

            echo "GitHub API failed; waiting ${delay}s before retry..."
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
            if [ "$delay" -gt 120 ]; then
              delay=120
            fi
          done
